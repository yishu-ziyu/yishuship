_base_: ../_base_/default.yaml

model:
  reasoning_effort: medium

train:
  batch_size: 4
  accumulation: 1
  num_epochs: 3

gradient:
  minibatch_size: 4
  merge_batch_size: 4

optimizer:
  learning_rate: 3

evaluation:
  gate_metric: mixed
  gate_mixed_weight: 0.5

env:
  name: yishuship
  skill_init: skillopt/envs/yishuship/skills/initial.md
  split_mode: split_dir
  split_dir: data/yishuship_split
  workers: 2
  max_completion_tokens: 4096
  limit: 0
